<style>
  /* Wizard look */
  .wizard-step {
    display: none;
    transition: all 0.3s ease;
  }
  .wizard-step.active {
    display: block;
  }
  .wizard-step input:disabled, .wizard-step textarea:disabled {
    background-color: #f0f0f0;
    color: #999;
  }
  .success-message {
    text-align: center;
    color: green;
    font-weight: bold;
    display: none;
    margin-top: 20px;
  }
</style>

</head>

<!-- CONTACT SECTION -->
<section id="contact" style="margin-top:100px;">
  <div class="container">
    <div class="row">
      <div class="col-md-12 text-center">
        <h1>Contact Me</h1>
        <p><b>Email:</b> ian.rohan@my.utsa.edu</p>
        <p><b>Phone:</b> (444) 444-4444</p>
        <hr>
      </div>
    </div>

    <!-- Wizard Form -->
    <div class="row">
      <div class="col-md-8 col-md-offset-2">
        <form id="contactForm" novalidate>

          <div class="wizard-step active">
            <div class="form-group">
              <label for="firstName">First Name:</label>
              <input type="text" class="form-control" id="firstName" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="lastName">Last Name:</label>
              <input type="text" class="form-control" id="lastName" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="email">Email:</label>
              <input type="email" class="form-control" id="email" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="phone">Phone Number (10 digits):</label>
              <input type="text" class="form-control" id="phone" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" class="form-control" id="username" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="password">Password:</label>
              <input type="password" class="form-control" id="password" required>
              <span class="help-block"></span>
              <button type="button" class="btn btn-primary nextBtn">Next</button>
            </div>
          </div>

          <div class="wizard-step">
            <div class="form-group">
              <label for="comments">Comments:</label>
              <textarea class="form-control" id="comments" rows="4" required></textarea>
              <span class="help-block"></span>
              <button type="submit" class="btn btn-success">Submit</button>
            </div>
          </div>

          <div class="success-message" id="successMsg">Form submitted successfully!</div>
        </form>
      </div>
    </div>
  </div>
</section>
