<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>JavaScript Test Page</title>
	<link rel="stylesheet" href="assets/css/bootstrap.min.css">
</head>
<body>
	<div id="page">
		<h1>List King</h1>
		<h2>New Account</h2>
		<div class="form-group" id="unGroup">
			<label class="control-label" for="username">Create a username: </label>
			<input type="text" id="username" name="Username" class="form-control"/>
			<span id="unfeedback" class="help-block"></span>
		</div>
		<div class="form-group" id="pwGroup">
			<label class="control-label" for="password">Create a password: </label>
			<input type="password" id="password" name="Password" class="form-control"/>
			<span id="pwfeedback" class="help-block"></span>
		</div>
		<input type="submit" value="Sign Up!" class="btn btn-success"/>
	</div>
	<script src="assets/js/event-handler.js"></script>
</body>
</html>
